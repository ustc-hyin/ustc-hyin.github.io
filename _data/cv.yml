      description:
        - Research on enhancing the image captioning capabilities of MLLMs through reinforcement learning strategies.
        - Developed a compact MLLM using supervised fine-tuning and reinforcement learning to generate highly precise, context-aware, and structured image captions, advancing real-world visual understanding.
        - Proposed a co-evolutionary adversarial framework to enhance MLLM image captioning by jointly optimizing a captioning model and a question-generation model within a self-reinforcing feedback loop, driving progressive improvements in descriptive fidelity and informational completeness.
  contents:
